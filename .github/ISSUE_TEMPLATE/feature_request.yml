name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Why is this feature useful? How would you use it?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Calendar / Shifts
        - Tasks / To-do
        - Shopping
        - Panel UI
        - iOS Widget
        - Notifications
        - Other
