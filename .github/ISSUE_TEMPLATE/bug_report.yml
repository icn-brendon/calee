name: Bug Report
description: Report a bug with Calee.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.1.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Calee version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1.
        2.
        3.

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs (Settings > System > Logs).
      render: text

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: >-
        Attach diagnostics JSON from Settings > Devices & Services >
        Calee > three-dot menu > Download Diagnostics.
        Sensitive fields are redacted automatically.
