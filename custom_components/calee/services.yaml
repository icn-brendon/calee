add_shift:
  name: Add shift
  description: Create a new shift event on a calendar.
  fields:
    calendar_id:
      name: Calendar
      description: The calendar to add the shift to.
      required: true
      selector:
        text:
    title:
      name: Title
      description: Shift title.
      required: true
      selector:
        text:
    start:
      name: Start
      description: Shift start time (ISO 8601).
      required: true
      selector:
        text:
    end:
      name: End
      description: Shift end time (ISO 8601).
      required: true
      selector:
        text:
    note:
      name: Note
      description: Optional note for the shift.
      selector:
        text:
          multiline: true
    template_id:
      name: Template
      description: Optional shift template ID used to create this shift.
      selector:
        text:
    recurrence_rule:
      name: Recurrence rule
      description: >-
        Optional recurrence pattern (e.g. "daily", "weekly", "biweekly",
        "monthly"). Leave blank for a one-off event.
      selector:
        text:

upsert_shift:
  name: Upsert shift
  description: >-
    Create or update a shift by external ID. If a shift with the given
    source + external_id already exists, it is updated. Otherwise a new
    shift is created. Designed for future importers.
  fields:
    calendar_id:
      name: Calendar
      description: The calendar for this shift.
      required: true
      selector:
        text:
    external_id:
      name: External ID
      description: Unique identifier from the external source.
      required: true
      selector:
        text:
    source:
      name: Source
      description: Name of the import source (e.g. "roster", "csv").
      required: true
      selector:
        text:
    title:
      name: Title
      description: Shift title.
      required: true
      selector:
        text:
    start:
      name: Start
      description: Shift start time (ISO 8601).
      required: true
      selector:
        text:
    end:
      name: End
      description: Shift end time (ISO 8601).
      required: true
      selector:
        text:
    note:
      name: Note
      description: Optional note for the shift.
      selector:
        text:
          multiline: true

update_shift:
  name: Update shift
  description: Update an existing shift event.
  fields:
    event_id:
      name: Event ID
      description: The ID of the event to update.
      required: true
      selector:
        text:
    version:
      name: Version
      description: >-
        Expected current version of the event (optimistic locking).
        The update is rejected if this does not match.
      required: true
      selector:
        number:
          min: 1
          mode: box
    title:
      name: Title
      description: New title (leave blank to keep current).
      selector:
        text:
    start:
      name: Start
      description: New start time (leave blank to keep current).
      selector:
        text:
    end:
      name: End
      description: New end time (leave blank to keep current).
      selector:
        text:
    note:
      name: Note
      description: New note (leave blank to keep current).
      selector:
        text:
          multiline: true
    recurrence_rule:
      name: Recurrence rule
      description: >-
        New recurrence pattern (e.g. "daily", "weekly", "biweekly",
        "monthly"). Pass empty string to clear. Leave blank to keep current.
      selector:
        text:

delete_shift:
  name: Delete shift
  description: Soft-delete a shift event (recoverable for 30 days).
  fields:
    event_id:
      name: Event ID
      description: The ID of the event to delete.
      required: true
      selector:
        text:

restore_shift:
  name: Restore shift
  description: Restore a previously soft-deleted shift event (undo delete).
  fields:
    event_id:
      name: Event ID
      description: The ID of the soft-deleted event to restore.
      required: true
      selector:
        text:

add_task:
  name: Add task
  description: Create a new task in a to-do list.
  fields:
    list_id:
      name: List
      description: The to-do list to add the task to.
      required: true
      selector:
        text:
    title:
      name: Title
      description: Task title.
      required: true
      selector:
        text:
    note:
      name: Note
      description: Optional note for the task.
      selector:
        text:
          multiline: true
    due:
      name: Due date
      description: Optional due date (ISO 8601 date or datetime).
      selector:
        text:
    related_event_id:
      name: Related event
      description: Optional calendar event ID to link this task to.
      selector:
        text:

complete_task:
  name: Complete task
  description: Mark a task as completed.
  fields:
    task_id:
      name: Task ID
      description: The ID of the task to complete.
      required: true
      selector:
        text:

update_task:
  name: Update task
  description: Update an existing task.
  fields:
    task_id:
      name: Task ID
      description: The ID of the task to update.
      required: true
      selector:
        text:
    version:
      name: Version
      description: >-
        Expected current version of the task (optimistic locking).
        The update is rejected if this does not match.
      required: true
      selector:
        number:
          min: 1
          mode: box
    title:
      name: Title
      description: New title (leave blank to keep current).
      selector:
        text:
    note:
      name: Note
      description: New note (leave blank to keep current).
      selector:
        text:
          multiline: true
    due:
      name: Due date
      description: New due date (leave blank to keep current).
      selector:
        text:
    list_id:
      name: List
      description: Move to a different list (leave blank to keep current).
      selector:
        text:
    completed:
      name: Completed
      description: Set completed status (leave blank to keep current).
      selector:
        boolean:

delete_task:
  name: Delete task
  description: Soft-delete a task (recoverable for 30 days).
  fields:
    task_id:
      name: Task ID
      description: The ID of the task to delete.
      required: true
      selector:
        text:

restore_task:
  name: Restore task
