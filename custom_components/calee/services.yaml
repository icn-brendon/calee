        text:

set_calendar_private:
  name: Set calendar privacy
  description: >-
    Toggle the privacy flag on a calendar. When private, only users with
    an explicit role (viewer, editor, or owner) can see or modify it.
  fields:
    calendar_id:
      name: Calendar ID
      description: The ID of the calendar to update.
      required: true
      selector:
        text:
    is_private:
      name: Private
      description: Set to true to make the calendar private, false to make it public.
      required: true
      selector:
        boolean:

set_list_private:
  name: Set list privacy
  description: >-
