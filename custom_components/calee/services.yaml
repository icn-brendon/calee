  fields:
    task_id:
      name: Task ID
      description: The ID of the soft-deleted task to restore.
      required: true
      selector:
        text:

snooze_reminder:
  name: Snooze reminder
  description: Snooze a shift reminder for the given number of minutes.
  fields:
    event_id:
      name: Event ID
      description: The shift event whose reminder is being snoozed.
      required: true
      selector:
        text:
    minutes:
      name: Minutes
      description: Number of minutes to snooze.
      required: true
      selector:
        number:
          min: 1
          max: 1440
          mode: box

create_template:
  name: Create shift template
  description: Create a reusable shift template for quick-adding shifts.
  fields:
    name:
      name: Name
      description: Template name (e.g. "Early", "Late", "Night").
      required: true
      selector:
        text:
    calendar_id:
      name: Calendar
      description: The calendar this template belongs to.
      required: true
      selector:
        text:
    start_time:
      name: Start time
      description: Shift start time in HH:MM format.
      required: true
      selector:
        text:
    end_time:
      name: End time
      description: Shift end time in HH:MM format. If earlier than start_time, the shift is treated as overnight.
      required: true
      selector:
        text:
    color:
      name: Color
      description: Optional color hex code for the template.
      selector:
        text:
    note:
      name: Note
      description: Optional default note for shifts created from this template.
      selector:
        text:
          multiline: true
    emoji:
      name: Emoji
      description: Optional emoji displayed on the template card and on events created from it.
      selector:
        text:

update_template:
  name: Update shift template
  description: Update an existing shift template. Only provided fields are changed; omitted fields keep their current values. The template ID is preserved.
  fields:
    template_id:
      name: Template ID
      description: The ID of the template to update.
      required: true
      selector:
        text:
    name:
      name: Name
      description: New template name (leave blank to keep current).
      selector:
        text:
    calendar_id:
      name: Calendar
      description: New calendar (leave blank to keep current).
      selector:
        text:
    start_time:
      name: Start time
      description: New start time in HH:MM format (leave blank to keep current).
      selector:
        text:
    end_time:
      name: End time
      description: New end time in HH:MM format (leave blank to keep current).
      selector:
        text:
    color:
      name: Color
      description: New color hex code (leave blank to keep current).
      selector:
        text:
    note:
      name: Note
      description: New default note (leave blank to keep current).
      selector:
        text:
          multiline: true
    emoji:
      name: Emoji
      description: New emoji (leave blank to keep current).
      selector:
        text:

delete_template:
  name: Delete shift template
  description: Delete a shift template.
  fields:
    template_id:
      name: Template ID
      description: The ID of the template to delete.
      required: true
      selector:
        text:

add_shift_from_template:
  name: Add shift from template
  description: Create a shift event from a template for a specific date. Overnight templates automatically set the end date to the following day.
  fields:
    template_id:
      name: Template ID
      description: The shift template to use.
      required: true
      selector:
        text:
    date:
      name: Date
      description: The date for the shift (ISO 8601 date, e.g. "2026-04-07").
      required: true
      selector:
        text:
    recurrence_rule:
      name: Recurrence rule
      description: >-
        Optional recurrence pattern for the created shift (e.g. "daily",
        "weekly", "biweekly", "monthly").
      selector:
        text:

link_task_to_event:
  name: Link task to event
  description: Associate a task with a calendar event so they are visually and logically connected.
  fields:
    task_id:
      name: Task ID
      description: The ID of the task to link.
      required: true
      selector:
        text:
    event_id:
      name: Event ID
      description: The ID of the calendar event to link the task to.
      required: true
      selector:
        text:

unlink_task_from_event:
  name: Unlink task from event
  description: Remove the association between a task and its linked calendar event.
  fields:
    task_id:
      name: Task ID
      description: The ID of the task to unlink.
      required: true
      selector:
        text:

import_csv:
  name: Import shifts from CSV
  description: >-
    Import shift data from CSV text (e.g. shift app export). Each row is
    upserted by a deterministic external ID so re-imports are idempotent.
  fields:
    calendar_id:
      name: Calendar
      description: The calendar to import shifts into.
      required: true
      selector:
        text:
    data:
      name: CSV data
      description: The raw CSV text content including the header row.
      required: true
      selector:
        text:
          multiline: true
    source:
      name: Source
      description: Import source label (default "csv").
      selector:
        text:
    dry_run:
      name: Dry run
      description: >-
        When true, parse and return counts (created/updated/skipped) without
        writing any data. Useful for previewing an import.
      default: false
      selector:
        boolean:

import_ics:
  name: Import shifts from ICS
  description: >-
    Import shift data from an ICS (iCalendar) file. Each VEVENT is upserted
    using its UID as external ID so re-imports are idempotent.
  fields:
    calendar_id:
      name: Calendar
      description: The calendar to import shifts into.
      required: true
      selector:
        text:
    data:
      name: ICS data
      description: The raw ICS (iCalendar) text content.
      required: true
      selector:
        text:
          multiline: true
    source:
      name: Source
      description: Import source label (default "ics").
      selector:
        text:
    dry_run:
      name: Dry run
      description: >-
        When true, parse and return counts (created/updated/skipped) without
        writing any data. Useful for previewing an import.
      default: false
      selector:
        boolean:

create_preset:
  name: Create task preset
